services:
  postgres:
    image: postgres:16
    container_name: vellum-postgres
    environment:
      POSTGRES_DB: vellum
      POSTGRES_USER: vellum_admin
      POSTGRES_PASSWORD: vellum_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellum_admin -d vellum"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

