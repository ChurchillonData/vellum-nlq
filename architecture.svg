<svg width="100%" viewBox="0 0 680 880" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vellum-NLQ request lifecycle and trust boundaries</title>
  <desc>Architecture diagram showing the eight modules of Vellum-NLQ, the trust boundary between LLM-proposed and deterministic stages, the three safety layers, and the audit trail as a cross-cutting concern.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#7F77DD" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <style>
      .t  { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 400; fill: #1A1A1A; }
      .ts { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .th { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #1A1A1A; }
      .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }
      .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal   .th { fill: #085041; }
      .c-teal   .ts { fill: #0F6E56; }
      .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber  .th { fill: #633806; }
      .c-amber  .ts { fill: #854F0B; }
      .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <text class="th" x="40" y="32">Request lifecycle</text>
  <text class="ts" x="40" y="50">Eight modules. Three safety layers. One read-only path.</text>

  <g class="c-gray">
    <rect x="40" y="72" width="600" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="60" y="98">Client</text>
    <text class="ts" x="60" y="116">POST /ask  ·  natural-language question  ·  optional context</text>
  </g>

  <line x1="340" y1="128" x2="340" y2="148" class="arr" marker-end="url(#arrow)"/>

  <rect x="40" y="148" width="600" height="118" rx="14" fill="url(#hatch)" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="ts" x="56" y="168" fill="#3C3489">Zone 1  ·  LLM-proposed  ·  treat as untrusted input</text>

  <g class="c-purple">
    <rect x="60" y="184" width="270" height="62" rx="8" stroke-width="0.5"/>
    <text class="th" x="195" y="206" text-anchor="middle">1. Intent interpreter</text>
    <text class="ts" x="195" y="226" text-anchor="middle">OpenAI API, structured output</text>
    <text class="ts" x="195" y="240" text-anchor="middle">returns AnalyticsRequest or Clarification</text>
  </g>

  <g class="c-purple">
    <rect x="350" y="184" width="270" height="62" rx="8" stroke-width="0.5"/>
    <text class="th" x="485" y="206" text-anchor="middle">2. Semantic resolver</text>
    <text class="ts" x="485" y="226" text-anchor="middle">validates against catalogue YAML</text>
    <text class="ts" x="485" y="240" text-anchor="middle">unknown metric → Clarification</text>
  </g>

  <line x1="330" y1="215" x2="350" y2="215" class="arr" marker-end="url(#arrow)"/>

  <line x1="40" y1="286" x2="640" y2="286" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="2 4"/>
  <text class="ts" x="340" y="282" text-anchor="middle" fill="#3C3489">trust boundary  ·  below this line, deterministic only</text>

  <line x1="485" y1="246" x2="485" y2="306" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="350" y="306" width="270" height="58" rx="8" stroke-width="0.5"/>
    <text class="th" x="485" y="328" text-anchor="middle">3. Query planner</text>
    <text class="ts" x="485" y="348" text-anchor="middle">builds LogicalPlan from joins.yaml</text>
  </g>

  <line x1="485" y1="364" x2="485" y2="384" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="350" y="384" width="270" height="58" rx="8" stroke-width="0.5"/>
    <text class="th" x="485" y="406" text-anchor="middle">4. SQL generator</text>
    <text class="ts" x="485" y="426" text-anchor="middle">SQLAlchemy Core, parameterised</text>
  </g>

  <line x1="485" y1="442" x2="485" y2="462" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="350" y="462" width="270" height="76" rx="8" stroke-width="1.5"/>
    <text class="th" x="485" y="486" text-anchor="middle">5. SQL guard</text>
    <text class="ts" x="485" y="506" text-anchor="middle">SQLGlot AST  ·  11 checks in order</text>
    <text class="ts" x="485" y="522" text-anchor="middle">tables · columns · functions · joins · LIMIT</text>
  </g>

  <g>
    <rect x="60" y="476" width="262" height="48" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text class="th" x="76" y="496" fill="#633806">Safety layer 1  ·  parser</text>
    <text class="ts" x="76" y="514" fill="#854F0B">rejection here returns ValidationError, no DB hit</text>
  </g>

  <line x1="485" y1="538" x2="485" y2="558" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="350" y="558" width="270" height="76" rx="8" stroke-width="1.5"/>
    <text class="th" x="485" y="582" text-anchor="middle">6. Query runner</text>
    <text class="ts" x="485" y="602" text-anchor="middle">role: vellum_reader  ·  SELECT only</text>
    <text class="ts" x="485" y="618" text-anchor="middle">statement_timeout 15s  ·  LIMIT 10k</text>
  </g>

  <g>
    <rect x="60" y="572" width="262" height="48" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text class="th" x="76" y="592" fill="#633806">Safety layer 2  ·  database role</text>
    <text class="ts" x="76" y="610" fill="#854F0B">no INSERT, UPDATE, DELETE, or DDL privileges</text>
  </g>

  <g class="c-gray">
    <rect x="490" y="640" width="130" height="26" rx="13" stroke-width="0.5"/>
    <text class="ts" x="555" y="657" text-anchor="middle">Postgres 16</text>
  </g>
  <line x1="485" y1="634" x2="525" y2="640" stroke="#888780" stroke-width="0.5"/>

  <line x1="485" y1="666" x2="485" y2="686" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="350" y="686" width="270" height="58" rx="8" stroke-width="0.5"/>
    <text class="th" x="485" y="708" text-anchor="middle">7. Answer composer</text>
    <text class="ts" x="485" y="728" text-anchor="middle">result set → summary + transparency payload</text>
  </g>

  <line x1="485" y1="744" x2="485" y2="784" class="arr" marker-end="url(#arrow)"/>

  <g class="c-gray">
    <rect x="350" y="784" width="270" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="485" y="806" text-anchor="middle">Response to client</text>
    <text class="ts" x="485" y="824" text-anchor="middle">Answer or Clarification + audit ID</text>
  </g>

  <g class="c-amber">
    <rect x="60" y="306" width="262" height="148" rx="8" stroke-width="1.5"/>
    <text class="th" x="191" y="332" text-anchor="middle">8. Audit logger</text>
    <text class="ts" x="191" y="352" text-anchor="middle">append-only  ·  separate schema</text>
    <text class="ts" x="191" y="372" text-anchor="middle">writes on every stage transition</text>
    <text class="ts" x="191" y="392" text-anchor="middle">question · intent · SQL · validation</text>
    <text class="ts" x="191" y="408" text-anchor="middle">row count · latency · query_id</text>
    <text class="ts" x="191" y="428" text-anchor="middle">role: vellum_auditor  ·  no UPDATE/DELETE</text>
    <text class="th" x="191" y="446" text-anchor="middle" fill="#633806">Safety layer 3</text>
  </g>

  <line x1="350" y1="335" x2="322" y2="335" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="350" y1="413" x2="322" y2="413" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="60" y1="430" x2="60" y2="700" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="60" y1="500" x2="350" y2="500" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="60" y1="596" x2="350" y2="596" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="60" y1="700" x2="350" y2="700" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="2 3"/>
</svg>
