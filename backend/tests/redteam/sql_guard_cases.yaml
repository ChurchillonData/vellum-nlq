cases:
  - id: guard_rejects_stacked_statement
    sql: SELECT claims.id FROM claims; DROP TABLE claims
    expected_rule: single_statement

  - id: guard_rejects_comment_payload
    sql: SELECT claims.id FROM claims -- hide mutation
    expected_rule: comments_absent

  - id: guard_rejects_system_schema
    sql: SELECT pg_tables.tablename FROM pg_catalog.pg_tables
    expected_rule: system_schema_absent

  - id: guard_rejects_unknown_table
    sql: SELECT users.id FROM users
    expected_rule: table_allowlist

  - id: guard_rejects_unknown_column
    sql: SELECT claims.secret_notes FROM claims
    expected_rule: column_allowlist

  - id: guard_rejects_disallowed_function
    sql: SELECT pg_sleep(1) FROM claims
    expected_rule: function_allowlist

  - id: guard_rejects_unapproved_join
    sql: SELECT claims.id FROM claims JOIN plans ON claims.member_id = plans.id
    expected_rule: join_allowlist

  - id: guard_rejects_embedded_string_literal
    sql: SELECT claims.id FROM claims WHERE claims.status = 'closed'
    expected_rule: parameter_literal_enforcement

  - id: guard_rejects_unlimited_grouped_result
    sql: SELECT providers.specialty, COUNT(claim_lines.id) FROM claim_lines JOIN providers ON claim_lines.provider_id = providers.id GROUP BY providers.specialty
    expected_rule: result_size_control

  - id: guard_rejects_large_grouped_result_limit
    sql: SELECT providers.specialty, COUNT(claim_lines.id) FROM claim_lines JOIN providers ON claim_lines.provider_id = providers.id GROUP BY providers.specialty LIMIT 500
    expected_rule: result_size_control

  - id: guard_rejects_inline_block_comment
    sql: SELECT claims.id FROM claims /* pretend this is harmless */
    expected_rule: comments_absent

  - id: guard_rejects_information_schema
    sql: SELECT tables.table_name FROM information_schema.tables
    expected_rule: system_schema_absent

  - id: guard_rejects_union_unknown_table
    sql: SELECT claims.id FROM claims UNION SELECT users.id FROM users
    expected_rule: select_only
